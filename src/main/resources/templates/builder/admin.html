<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{builder/layout :: layout(~{::title}, ~{::section}, 0)}">

<head>
    <title>Admin</title>
</head>

<body>

    <section style="flex: 1; width: 100%;">

        <div class="main-content">

            <div class="page-wrapper">

                <div class="draft-list">

                    <div class="draft-card" th:each="tpName : ${tariff}">

                        <span class="draft-name" th:text="${tpName}"> </span>

                        <div class="actions">
                            <button class="btn btn-hierarchy" th:attr="onclick=|loadHierarchy('${tpName}')|">View
                                Hierarchy</button>

                            <button class="btn btn-approve">Approve</button>

                            <button class="btn btn-reject">Reject</button>
                        </div>

                    </div>

                    <div th:if="${#lists.isEmpty(tariff)}">
                        <p>No Tariff Packages available</p>
                    </div>
                </div>

            </div>

        </div>

    </section>

</body>

</html>
