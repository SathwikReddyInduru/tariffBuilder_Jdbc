<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{builder/layout :: layout(~{::title}, ~{::section}, 0)}">

<head>
    <title>Admin</title>
</head>

<body>

<section style="flex:1; width:100%;">

    <div class="main-content">
        <div class="page-wrapper">

            <div class="draft-list">

                <div class="draft-card"
                     th:each="t : ${tariff}"
                     th:id="'card-' + ${t.tariffPackageId}"
                     th:if="${t.status} == 'P'">

                    <span class="draft-name"
                          th:text="${t.tariffPackageName}">
                    </span>

                    <div class="actions">
                        <a class="btn btn-hierarchy"
                           th:href="@{/admin/hierarchy/{id}(id=${t.networkId})}">
                            View Hierarchy
                        </a>

                        <button class="btn btn-approve"
                                th:onclick="'handleAction(' + ${t.tariffPackageId} + ', \'A\')'">
                            Approve
                        </button>

                        <button class="btn btn-reject"
                                th:onclick="'handleAction(' + ${t.tariffPackageId} + ', \'R\')'">
                            Reject
                        </button>
                    </div>

                </div>

                <div th:if="${#lists.isEmpty(tariff.?[status == 'P'])}"
                     style="text-align:center; margin-top:20px;">
                    <p>No pending tariffs</p>
                </div>

            </div>

        </div>
    </div>

</section>

</body>
</html>
