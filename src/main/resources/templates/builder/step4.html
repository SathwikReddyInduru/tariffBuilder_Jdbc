<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{builder/layout :: layout(~{::title}, ~{::section}, 4)}">

<head>
    <title>Allowed ATPs</title>
</head>

<body>
    <section class="stage">
        <div class="step-guide modern">

            <div class="guide-header">
                <span class="material-icons">add_circle</span>
                <b>Allowed Additional Tariff Plans (AATP)</b>
            </div>

            <div class="guide-steps">

                <div class="guide-step">
                    <span class="guide-num">1</span>
                    <span> AATP are permitted add-on services that users can choose in addition to the main tariff plan.</span>
                </div>

            </div>

            <div class="guide-points">
                <span class="guide-pill">Enhances base package</span>
                <span class="guide-pill">Flexible Choice</span>
                <span class="guide-pill">Allowed Benefits</span>
            </div>

        </div>

        <div class="svc-container">
            <button class="svc-pill" data-svc="VOICE" onclick="toggleSvc('VOICE', this)">
                <span class="material-icons pill-icon">phone</span>
                VOICE</button>
            <button class="svc-pill" data-svc="SMS" onclick="toggleSvc('SMS', this)">
                <span class="material-icons pill-icon">sms</span>
                SMS</button>
            <button class="svc-pill" data-svc="DATA" onclick="toggleSvc('DATA', this)">
                <span class="material-icons pill-icon">wifi</span>
                DATA</button>
        </div>

        <!-- Drop zone — rendered by step4.js -->
        <div id="dropArea" class="service-results"></div>

        <div class="step-actions">
            <button class="btn-secondary" onclick="goBack()" th:disabled="${activeStep == 1}">
                <span class="material-icons">arrow_back</span>
                Back
            </button>

            <button class="btn-primary" onclick="goNext()" th:disabled="${activeStep == 5}">
                Continue
                <span class="material-icons">arrow_forward</span>
            </button>
        </div>

        <script th:src="@{/js/step4.js}"></script>
    </section>
</body>

</html>
