<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Xius Login</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #5f76d6, #7b4bb7);
        }

        .navbar {
            background: #f3f3f3;
            padding: 10px;
            margin-right: auto;
        }

        .navbar img {
            margin-left: 20px;
        }

        .card {
            width: 360px;
            max-width: 90%;
            margin: 80px auto;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .icon {
            font-size: 50px;
            color: #4aa3df;
        }

        .subtitle {
            font-size: 14px;
            margin: 10px 0 20px;
            color: #4a5d73;
        }

        .input-box {
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
        }

        .input-box label {
            font-size: 13px;
            font-weight: bold;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            padding: 10px 35px 10px 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .input-wrapper .material-icons {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            pointer-events: none;
        }

        .error {
            color: red;
            font-size: 11px;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .btn {
            width: 48%;
            padding: 8px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .cancel {
            background: #ddd;
        }

        .submit {
            background: #2b8cc4;
            color: white;
        }
    </style>

</head>

<body>

    <div class="navbar">
        <img src="https://www.xius.com/wp-content/themes/xius/assets/img/logo/logo.png" alt="Xius Logo"
            style="height:50px; vertical-align:middle;">
    </div>

    <div class="card">

        <span class="material-icons icon">lock</span>

        <div class="subtitle">
            Enter your credentials to access the system
        </div>

        <!-- error message -->
        <div th:if="${message != null}" style="color:red;margin-bottom:10px;" th:text="${message}">
        </div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post" autocomplete="off">
            <!-- network name -->
            <div class="input-box">
    <label>Network *</label>
    <div class="input-wrapper">
        <input type="text" th:field="*{networkLoginName}" placeholder="Enter network name">
        <span class="material-icons">dns</span>
    </div>
</div>
            <!-- username -->
            <div class="input-box">
                <label>Username *</label>
                <div class="input-wrapper">
                    <input type="text" th:field="*{loginId}" placeholder="Enter username">
                    <span class="material-icons">person</span>
                </div>
            </div>

            <!-- password -->
            <div class="input-box">
                <label>Password *</label>
                <div class="input-wrapper">
                    <input type="password" th:field="*{password}" placeholder="Enter password">
                    <span class="material-icons">lock</span>
                </div>
            </div>

            <div class="buttons">
                <button type="reset" class="btn cancel">
                    Cancel
                </button>

                <button type="submit" class="btn submit">
                    Submit
                </button>
            </div>

        </form>

    </div>

</body>

</html>
